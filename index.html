<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech_Information</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      cursor: crosshair;
      font-family: 'Share Tech Mono', monospace;
      background: black;
      color: #00ff66;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
    }

    .loader-text {
      color: #00ff66;
      font-size: 1.5rem;
      text-shadow: 0 0 10px #00ff66;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: black;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: rgba(0, 0, 0, 0.75);
      border: 2px solid #00ff66;
      border-radius: 20px;
      padding: 40px 25px;
      text-align: center;
      box-shadow: 0 0 30px #00ff66;
      backdrop-filter: blur(4px);
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: auto;
      border-radius: 50%;
      border: 3px solid #00ff66;
      overflow: hidden;
      box-shadow: 0 0 20px #00ff66;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.2rem;
      text-shadow: 0 0 10px #00ff66;
    }

    .typing {
      margin-top: 10px;
      font-size: 1rem;
      color: #66ff99;
      min-height: 24px;
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      border: 2px solid #00ff66;
      border-radius: 14px;
      color: #00ff66;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.3s ease;
      background: rgba(0, 255, 102, 0.08);
    }

    body::before {
      content: '';
      position: fixed;
      width: 12px;
      height: 12px;
      background: #00ff66;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 15px #00ff66;
      animation: pulse 1s infinite;
      z-index: 999;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .btn:hover {
      background: #00ff66;
      color: black;
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ff66;
    }

    .btn img {
      width: 28px;
      height: 28px;
    }

    footer {
      margin-top: 30px;
      color: #66ff99;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .card {
        padding: 30px 20px;
      }
    }
  </style></head>

      'System Online...',
    ];

    let cmdIndex = 0;

    function showCommand() {
      if (cmdIndex < commands.length) {
        terminal.innerHTML += '> ' + commands[cmdIndex] + '<br>';
        terminal.scrollTop = terminal.scrollHeight;
        cmdIndex++;
      } else {
        terminal.innerHTML = '';
        cmdIndex = 0;
      }
    }

    setInterval(showCommand, 1500);

    // Typing Effect
    const text = "WELCOME TO TECH_INFORMATION";
    const typing = document.getElementById("typing");
    let i = 0;

    function typeText() {
      if (i < text.length) {
        typing.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 80);
      }
    }

    typeText();


    // Mouse Glow Effect
    document.addEventListener('mousemove', (e) => {
      document.body.style.setProperty('--x', e.clientX + 'px');
      document.body.style.setProperty('--y', e.clientY + 'px');
    });

    // Matrix Background Effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = '01TECHINFOHACKER';
    const fontSize = 14;
    const columns = canvas.width / fontSize;

    const drops = [];

    for (let x = 0; x < columns; x++) {
      drops[x] = 1;
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ff66';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));

        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    // Loading Screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
      }, 2500);
    });

    // Fake Visitor Counter
    let count = localStorage.getItem('visitorCount');

    if (!count) {
      count = 1000;
    }

    count++;

    localStorage.setItem('visitorCount', count);

    document.getElementById('visitor-count').innerText = count;
  </script></body>
</html>
