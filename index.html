<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech_Information</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: black;
      color: #00ff66;
      overflow-x: hidden;
      min-height: 100vh;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: black;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: rgba(0, 0, 0, 0.75);
      border: 2px solid #00ff66;
      border-radius: 20px;
      padding: 40px 25px;
      text-align: center;
      box-shadow: 0 0 30px #00ff66;
      backdrop-filter: blur(4px);
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: auto;
      border-radius: 50%;
      border: 3px solid #00ff66;
      overflow: hidden;
      box-shadow: 0 0 20px #00ff66;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.2rem;
      text-shadow: 0 0 10px #00ff66;
    }

    .typing {
      margin-top: 10px;
      font-size: 1rem;
      color: #66ff99;
      min-height: 24px;
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      border: 2px solid #00ff66;
      border-radius: 14px;
      color: #00ff66;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.3s ease;
      background: rgba(0, 255, 102, 0.08);
    }

    .btn:hover {
      background: #00ff66;
      color: black;
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ff66;
    }

    .btn img {
      width: 28px;
      height: 28px;
    }

    footer {
      margin-top: 30px;
      color: #66ff99;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .card {
        padding: 30px 20px;
      }
    }
  </style></head>
<body><canvas id="matrix"></canvas>

  <div class="container">
    <div class="card"><div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="Logo">
  </div>

  <h1>Tech_Information</h1>

  <div class="typing" id="typing"></div>

  <div class="buttons">

    <a class="btn" href="https://www.youtube.com/channel/UCqV3djmvmd2HcjVM8K_KGKg" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
      YouTube Channel
    </a>

    <a class="btn" href="https://www.facebook.com/share/18dnHwmiWz/" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      Facebook Page
    </a>

    <a class="btn" href="https://www.instagram.com/techinformation2026?igsh=MXZtc3cydmgybDczdQ==" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      Instagram Profile
    </a>

    <a class="btn" href="https://t.me/Tech_information2026" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
      Telegram Channel
    </a>

  </div>

  <footer>
    ACCESS GRANTED • TECH_INFORMATION • 2026
  </footer>

</div>

  </div>  <script>
    // Typing Effect
    const text = "WELCOME TO TECH_INFORMATION";
    const typing = document.getElementById("typing");
    let i = 0;

    function typeText() {
      if (i < text.length) {
        typing.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 80);
      }
    }

    typeText();


    // Matrix Background Effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = '01TECHINFOHACKER';
    const fontSize = 14;
    const columns = canvas.width / fontSize;

    const drops = [];

    for (let x = 0; x < columns; x++) {
      drops[x] = 1;
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ff66';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));

        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);
  </script></body>
</html>
